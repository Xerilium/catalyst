# @req FR:ai-provider/commands.@playbook
id: install-ai-providers
description: Install Catalyst AI command files for every configured provider; untrack legacy committed files; write provider gitignores idempotently.
owner: Engineer

# @req FR:ai-provider/commands.input
inputs:
  - string: project-root
    required: true
    description: Project root directory where command files are written
    # TODO (Run 2+): Replace with a `{project-root}://` path protocol so callers don't need to compute this.

steps:
  # Resolve package-internal resource paths via the catalyst:// protocol.
  # The path resolver substitutes these before the script step runs.
  - var: templates-dir
    value: catalyst://ai-config/commands
  - var: configs-path
    value: catalyst://ai-providers/command-configs.json

  # Enumerate command-template filenames via the native file-list action.
  - name: command-files
    file-list:
      path: "{{templates-dir}}"
      pattern: '*.md'

  # Load the provider catalog via the native json-read action.
  # Used by both Step 1 (generate) and Step 2 (legacy untrack).
  - name: provider-catalog
    json-read: "{{configs-path}}"

  # ------------------------------------------------------------------
  # Step 1: Generate command files and write gitignores for every provider
  # @req FR:ai-provider/commands.discovery
  # @req FR:ai-provider/commands.generate
  # @req FR:ai-provider/commands.transform
  # @req FR:ai-provider/commands.gitignore-folder
  # @req FR:ai-provider/commands.gitignore-flat-new
  # @req FR:ai-provider/commands.gitignore-flat-merge
  # @req FR:ai-provider/commands.idempotent
  # ------------------------------------------------------------------
  - name: generate-result
    script: |
      const projectRoot = get('project-root');
      const templatesDir = get('templates-dir');
      const commandFiles = get('command-files');

      const providers = Object.values(get('provider-catalog'));

      const placed = [];

      for (const provider of providers) {
        const { displayName, commands } = provider;
        const targetDir = path.join(projectRoot, commands.path);
        const catalystDir = commands.useNamespaces ? path.join(targetDir, 'catalyst') : targetDir;

        fs.mkdirSync(catalystDir, { recursive: true });

        for (const commandFile of commandFiles) {
          const commandName = path.basename(commandFile, '.md');
          const templatePath = path.join(templatesDir, commandFile);
          let content = fs.readFileSync(templatePath, 'utf8');

          // Strip front matter when useFrontMatter is false
          if (!commands.useFrontMatter && content.startsWith('---\n')) {
            const endIdx = content.indexOf('\n---\n', 4);
            if (endIdx !== -1) {
              content = content.slice(endIdx + 5);
            }
          }

          // Rewrite namespace separator
          content = content.replace(/\/catalyst:/g, '/catalyst' + commands.separator);

          // Replace platform placeholder
          content = content.replace(/\$\$AI_PLATFORM\$\$/g, displayName);

          // Compute output filename per provider's naming convention
          const outputName = commands.useNamespaces
            ? commandName + '.' + commands.extension
            : 'catalyst.' + commandName + '.' + commands.extension;
          const outputPath = path.join(catalystDir, outputName);

          fs.writeFileSync(outputPath, content);
          placed.push(outputPath);
        }

        // Write provider .gitignore
        if (commands.useNamespaces) {
          // Folder-based: single * in the catalyst subdir gitignores all generated files
          const gitignorePath = path.join(catalystDir, '.gitignore');
          fs.writeFileSync(gitignorePath, '# Generated by Catalyst — do not edit manually\n*\n');
        } else {
          // Flat: merge or create at the provider's command path root
          const gitignorePath = path.join(targetDir, '.gitignore');
          const pattern = 'catalyst.*.' + commands.extension;
          const header = '# Generated by Catalyst — do not edit manually';

          if (fs.existsSync(gitignorePath)) {
            const existing = fs.readFileSync(gitignorePath, 'utf8');
            if (!existing.includes(pattern)) {
              const separator = existing.endsWith('\n') ? '\n' : '\n\n';
              fs.writeFileSync(gitignorePath, existing + separator + header + '\n' + pattern + '\n');
            }
          } else {
            fs.writeFileSync(gitignorePath, header + '\n.gitignore\n' + pattern + '\n');
          }
        }
      }

      return {
        providers: providers.map(p => p.displayName),
        filesPlaced: placed.length
      };

  # ------------------------------------------------------------------
  # Step 2: Untrack legacy committed command files for each provider
  # @req FR:ai-provider/commands.legacy
  # ------------------------------------------------------------------
  - name: providers-for-migrate
    script: |
      return Object.values(get('provider-catalog'));

  - for-each: provider
    in: "{{providers-for-migrate}}"
    steps:
      - name: legacy-pattern
        script: |
          const p = get('provider');
          return p.commands.useNamespaces
            ? p.commands.path + '/catalyst/*'
            : p.commands.path + '/catalyst.*.' + p.commands.extension;

      - name: tracked
        bash: |
          git ls-files {{legacy-pattern}} 2>/dev/null || true
        cwd: "{{project-root}}"

      - if: ${{ get('tracked').stdout.trim().length > 0 }}
        then:
          - bash: |
              cd "{{project-root}}" && git rm --cached $(echo "{{tracked.stdout}}" | tr '\n' ' ')

  - display: "✓ Installed Catalyst commands for {{generate-result.providers.length}} providers ({{generate-result.filesPlaced}} files)."
